version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: tabsis-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - tabsis-net

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: tabsis-backend
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: tarim_kooperatif
      JWT_SECRET: ${JWT_SECRET:-DEGISTIR-guclu-ve-rastgele-bir-deger}
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    ports:
      - "8001:8001"
    depends_on:
      - mongo
    networks:
      - tabsis-net

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      args:
        REACT_APP_BACKEND_URL: http://localhost:8001
    container_name: tabsis-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - tabsis-net

volumes:
  mongo_data:

networks:
  tabsis-net:
    driver: bridge
